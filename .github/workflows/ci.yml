name: CI

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: workshop-app

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Docker image locally
      - name: Build image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      # Scan image with Trivy (fail if CRITICAL found)
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag and push image to Docker Hub
      - name: Tag and push
        run: |
          FULL=${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME

          docker tag $IMAGE_NAME:${{ github.sha }} $FULL:${{ github.sha }}
          docker tag $IMAGE_NAME:${{ github.sha }} $FULL:latest

          docker push $FULL:${{ github.sha }}
          docker push $FULL:latest